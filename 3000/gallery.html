<style>
:root{
  --bg1:#1a1026;
  --bg2:#0f061a;
  --accent:#ff6b9d;
  --accent-soft:#ffc2d9;
  --text:#ffffff;

}
body.demon{
  background:radial-gradient(circle at 20% 20%, #3a0000, #100000) !important;
  color:#ffdddd;
} 

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 20% 20%, #2a1240, var(--bg2));
  color:var(--text);
  overflow-x:hidden;
}
.top-left-countdown{
  position:fixed;
  top:14px;
  left:14px;
  z-index:250;
  background:rgba(0,0,0,.38);
  border:1px solid rgba(255,255,255,.2);
  border-radius:14px;
  padding:10px;
  backdrop-filter:blur(8px);
}
.top-left-countdown .label{
  font-size:.72rem;
  color:var(--accent-soft);
  margin-bottom:6px;
  text-align:left;
}
.top-left-countdown .mini-row{
  display:flex;
  gap:8px;
}
.top-left-countdown .mini-box{
  min-width:56px;
  background:rgba(255,255,255,.1);
  border-radius:10px;
  padding:6px 8px;
  text-align:center;
}
.top-left-countdown .mini-box span{
  display:block;
  font-weight:700;
  font-size:1rem;
}
.top-left-countdown .mini-box small{
  font-size:.68rem;
  color:var(--muted);
}
body.locked{
  overflow:hidden;
}
body.locked > *:not(#accessGate){
  visibility:hidden;
}
body.unlocked > *:not(#accessGate){
  visibility:visible;
}
#accessGate{
  position:fixed;
  inset:0;
  z-index:10000;
  background:radial-gradient(circle at 20% 20%, #2a1240, var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#accessGate.hidden{
  display:none;
}
.gate-card{
  width:min(420px, 100%);
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  border-radius:24px;
  padding:24px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
  position:relative;
  overflow:hidden;
}
.gate-card.success{
  animation:gateSuccessPulse .9s ease forwards;
}
.gate-card h2{
  font-family:'Playfair Display',serif;
  margin-bottom:8px;
}
.gate-card p{
  color:var(--muted);
  margin-bottom:16px;
}
.gate-dots{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
}
.gate-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.4);
  background:transparent;
}
.gate-dot.filled{
  background:var(--accent-soft);
  border-color:var(--accent-soft);
}
.gate-dot.burst{
  animation:dotBurst .5s ease;
}
.gate-status{
  min-height:24px;
  font-weight:600;
  margin-bottom:14px;
}
.gate-pad{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
}
.gate-key{
  border:none;
  border-radius:14px;
  padding:12px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  background:rgba(255,255,255,.15);
  color:#fff;
}
.gate-key:hover{
  background:rgba(255,255,255,.24);
}
.gate-heart{
  position:absolute;
  font-size:18px;
  pointer-events:none;
  animation:gateHeartUp 900ms ease-out forwards;
  z-index:2;
}
@keyframes gateSuccessPulse{
  0%{transform:scale(1); box-shadow:0 20px 60px rgba(0,0,0,.45);}
  45%{transform:scale(1.04); box-shadow:0 0 30px rgba(255,194,217,.55), 0 20px 60px rgba(0,0,0,.45);}
  100%{transform:scale(1);}
}
@keyframes gateHeartUp{
  0%{transform:translateY(0) scale(.7); opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-120px) scale(1.25); opacity:0;}
}
@keyframes dotBurst{
  0%{transform:scale(1);}
  40%{transform:scale(1.35);}
  100%{transform:scale(1);}
}
.scroll-progress{position:fixed;top:0;left:0;height:4px;width:0;z-index:300;background:linear-gradient(90deg,#ff6b9d,#ffc2d9);box-shadow:0 0 18px rgba(255,107,157,.75);}
.cursor-glow{position:fixed;width:24px;height:24px;border-radius:50%;pointer-events:none;z-index:210;background:radial-gradient(circle,rgba(255,194,217,.55) 0%, rgba(255,194,217,0) 70%);transform:translate(-50%,-50%);transition:opacity .2s ease;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(2px);z-index:0;opacity:.32;pointer-events:none;}
.orb-1{width:240px;height:240px;background:radial-gradient(circle,#ff78a8 0%,rgba(255,120,168,0) 75%);top:8%;left:6%;animation:driftA 14s ease-in-out infinite;}
.orb-2{width:320px;height:320px;background:radial-gradient(circle,#87bbff 0%,rgba(135,187,255,0) 75%);right:4%;top:25%;animation:driftB 18s ease-in-out infinite;}
.orb-3{width:210px;height:210px;background:radial-gradient(circle,#ffd37d 0%,rgba(255,211,125,0) 75%);left:40%;bottom:8%;animation:driftA 16s ease-in-out infinite reverse;}
@keyframes driftA{0%,100%{transform:translate3d(0,0,0);}50%{transform:translate3d(26px,-24px,0);}}
@keyframes driftB{0%,100%{transform:translate3d(0,0,0);}50%{transform:translate3d(-30px,22px,0);}}

.reveal.visible{opacity:1;transform:translateY(0) scale(1);}

<script>
const gateElement = document.getElementById('accessGate');
const gateCard = document.querySelector('#accessGate .gate-card');
const statusElement = document.getElementById('status');
const dotElements = Array.from(document.querySelectorAll('#gateDots .gate-dot'));
const correctCombination = ['0','9','0','4','2','5'];
let currentCombination = [];

function updateGateDots(){
  dotElements.forEach((dot, index)=>{
    dot.classList.toggle('filled', index < currentCombination.length);
  });
}
function closeGate(){
  try{ sessionStorage.setItem('loveUnlocked', '1'); }catch(e){}
  document.body.classList.remove('locked');
  document.body.classList.add('unlocked');
  if(gateElement) gateElement.classList.add('hidden');
}
function resetEntry(message){
  currentCombination = [];
  updateGateDots();
  if(statusElement){
    statusElement.textContent = message || '';
    statusElement.style.color = '#fff';
  }
}
function checkCombination() {
  if (!statusElement) return;
  if (currentCombination.join('') === correctCombination.join('')) {
    statusElement.textContent = '¡Nuestro amor!';
    statusElement.style.color = '#ffccd5';
    playUnlockAnimation();
    setTimeout(() => {
      closeGate();
    }, 1000);
  } else {
    statusElement.textContent = 'Intenta de nuevo, mi amor';
    statusElement.style.color = '#fff';
    setTimeout(() => resetEntry(''), 900);
  }
}
function playUnlockAnimation(){
  if(!gateCard) return;
  gateCard.classList.remove('success');
  void gateCard.offsetWidth;
  gateCard.classList.add('success');
  dotElements.forEach((dot, index)=>{
    setTimeout(()=>{
      dot.classList.remove('burst');
      void dot.offsetWidth;
      dot.classList.add('burst');
    }, index * 40);
  });
  for(let i=0;i<16;i++){
    const heart = document.createElement('span');
    heart.className = 'gate-heart';
    heart.textContent = Math.random() < 0.5 ? '❤' : '✨';
    heart.style.left = `${Math.random() * 90 + 5}%`;
    heart.style.bottom = `${Math.random() * 30 + 20}px`;
    heart.style.animationDelay = `${Math.random() * 120}ms`;
    gateCard.appendChild(heart);
    setTimeout(()=> heart.remove(), 950);
  }
}
function pushDigit(value){
  if(currentCombination.length >= correctCombination.length) return;
  currentCombination.push(String(value));
  updateGateDots();
  if(currentCombination.length === correctCombination.length){
    checkCombination();
  }
}

let gateUnlockedFromSession = false;
try{
  gateUnlockedFromSession = sessionStorage.getItem('loveUnlocked') === '1';
} catch(e){
  gateUnlockedFromSession = false;
}
if(gateUnlockedFromSession){
  closeGate();
} else {
  document.body.classList.add('locked');
  document.body.classList.remove('unlocked');
}
document.querySelectorAll('.gate-key[data-digit]').forEach((key)=>{
  key.addEventListener('click', ()=> pushDigit(key.dataset.digit));
});
const clearCodeBtn = document.getElementById('clearCode');
if(clearCodeBtn){
  clearCodeBtn.addEventListener('click', ()=> resetEntry(''));
}
const delCodeBtn = document.getElementById('delCode');
if(delCodeBtn){
  delCodeBtn.addEventListener('click', ()=>{
    if(!currentCombination.length) return;
    currentCombination.pop();
    updateGateDots();
  });
}
document.addEventListener('keydown', (evt)=>{
  if(gateUnlockedFromSession) return;
  if(gateElement && gateElement.classList.contains('hidden')) return;
  if(evt.key >= '0' && evt.key <= '9'){
    pushDigit(evt.key);
    return;
  }
  if(evt.key === 'Backspace'){
    evt.preventDefault();
    currentCombination.pop();
    updateGateDots();
    return;
  }
  if(evt.key.toLowerCase() === 'c'){
    resetEntry('');
  }
});

function nextMarch9(){
  const now = new Date();
  const year = now.getFullYear();
  let target = new Date(`${year}-03-09T00:00:00`);
  if(target <= now){
    target = new Date(`${year+1}-03-09T00:00:00`);
  }
  return target;
}
function updateTopCountdown(){
  const now = new Date();
  const target = nextMarch9();
  const diff = target - now;
  const daysEl = document.getElementById('topDays');
  const hoursEl = document.getElementById('topHours');
  const minutesEl = document.getElementById('topMinutes');
  if(!daysEl || !hoursEl || !minutesEl) return;
  if(diff <= 0){
    daysEl.textContent = '0';
    hoursEl.textContent = '0';
    minutesEl.textContent = '0';
    return;
  }
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);
  daysEl.textContent = days;
  hoursEl.textContent = hours;
  minutesEl.textContent = minutes;
}
setInterval(updateTopCountdown, 1000);
updateTopCountdown();

function startHeartRain(containerSelector){
  const container = containerSelector ? document.querySelector(containerSelector) : document.body;
  if(!container) return;
  heartInterval=setInterval(()=>{
    const heart=document.createElement('div');
    heart.className='heart';
    heart.style.left=Math.random()*100+'vw';
    heart.style.animationDuration=(6+Math.random()*5)+'s';
    container.appendChild(heart);
    setTimeout(()=>heart.remove(),10000);
  },800);
}
function stopHeartRain(containerSelector){
  clearInterval(heartInterval);
  const sel = containerSelector || 'body';
  document.querySelectorAll(sel+' .heart').forEach(h=>h.remove());
}
let heartInterval,emojiInterval,demonMode=false;
function startEmojiRain(containerSelector){
  const c=document.querySelector(containerSelector);
  emojiInterval=setInterval(()=>{const e=document.createElement('div');e.className='emoji';e.textContent=Math.random()<0.5?'\uD83C\uDF51':'\uD83C\uDF46';e.style.left=Math.random()*100+'vw';c.appendChild(e);setTimeout(()=>e.remove(),7000);},260);
}
function stopEmojiRain(containerSelector){clearInterval(emojiInterval);document.querySelectorAll(containerSelector+' .emoji').forEach(e=>e.remove());}

let revealObserver;
function setupRevealObserver(){
  if(revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries)=>{
    entries.forEach((entry)=>{
      if(entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold:0.14 });
}
function attachTilt(element){
  if(!element || element.dataset.tiltBound === '1') return;
  element.dataset.tiltBound = '1';
  element.classList.add('tilt-card');
  element.addEventListener('pointermove', (e)=>{
    const rect = element.getBoundingClientRect();
    const rx = ((e.clientY - rect.top) / rect.height - 0.5) * -7;
    const ry = ((e.clientX - rect.left) / rect.width - 0.5) * 9;
    element.style.transform = `perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg)`;
  });
  element.addEventListener('pointerleave', ()=>{ element.style.transform = 'perspective(700px) rotateX(0) rotateY(0)'; });
}
function applyInteractiveHooks(){
  if(!revealObserver) setupRevealObserver();
  document.querySelectorAll('.hero, .gallery-card, .gallery-card img, .ipod-player').forEach((el)=>{
    if(!el.classList.contains('reveal')) el.classList.add('reveal');
    revealObserver.observe(el);
  });
  document.querySelectorAll('.gallery-card, .gallery-card img').forEach(attachTilt);
}
function initInteractiveScene(){
  const progress = document.getElementById('scrollProgress');
  const glow = document.getElementById('cursorGlow');
  const magneticButtons = document.querySelectorAll('.hero-buttons .button');
  window.addEventListener('scroll', ()=>{
    const scrollMax = Math.max(document.body.scrollHeight - window.innerHeight, 1);
    const pct = (window.scrollY / scrollMax) * 100;
    if(progress) progress.style.width = `${Math.min(100, Math.max(0, pct))}%`;
  }, { passive:true });
  window.addEventListener('pointermove', (e)=>{
    if(!glow) return;
    glow.style.left = `${e.clientX}px`;
    glow.style.top = `${e.clientY}px`;
    glow.style.opacity = '1';
  });
  magneticButtons.forEach((btn)=>{
    btn.addEventListener('pointermove', (e)=>{
      const r = btn.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width - 0.5) * 10;
      const y = ((e.clientY - r.top) / r.height - 0.5) * 8;
      btn.style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
    });
    btn.addEventListener('pointerleave', ()=>{ btn.style.transform = ''; });
  });
  applyInteractiveHooks();
}

// spotify player in iPod screen
const playBtn = document.getElementById('playPause');
const prevBtn = document.getElementById('prevTrack');
const nextBtn = document.getElementById('nextTrack');
const wheelPlayPause = document.getElementById('wheelPlayPause');
const wheelMenu = document.getElementById('wheelMenu');
const spotifyFrame = document.getElementById('spotifyPlaylistFrame');
let spotifyController = null;
let spotifyIsPlaying = false;
let spotifyApi = null;
let spotifyFallbackMode = false;
let spotifyPlaybackPositionMs = 0;
const FORCE_LOCAL_AUDIO = false;
let localMode = false;
let localIndex = 0;
const localAudio = new Audio();
localAudio.preload = 'metadata';

function getSpotifyUri(url){
  if(!url) return '';
  try{
    const parsed = new URL(url);
    if(!parsed.hostname.includes('spotify.com')) return '';
    const parts = parsed.pathname.split('/').filter(Boolean);
    if(parts.length >= 2 && parts[0] === 'playlist'){
      return `spotify:playlist:${parts[1]}`;
    }
  } catch(e){ return ''; }
  return '';
}
function getSpotifyEmbedUrl(url){
  if(!url) return '';
  try{
    const parsed = new URL(url);
    if(!parsed.hostname.includes('spotify.com')) return '';
    const parts = parsed.pathname.split('/').filter(Boolean);
    if(parts.length >= 2 && parts[0] === 'playlist'){
      return `https://open.spotify.com/embed/playlist/${parts[1]}?utm_source=generator`;
    }
  } catch(e){ return ''; }
  return '';
}
function loadLocalTrack(index){
  const tracks = CONFIG.localTracks || [];
  if(!tracks.length) return false;
  localIndex = (index + tracks.length) % tracks.length;
  const track = tracks[localIndex];
  if(!track || !track.src) return false;
  localAudio.src = track.src;
  localAudio.load();
  return true;
}
function enableLocalMode(){
  if(localMode) return;
  localMode = true;
  spotifyFallbackMode = false;
  if(spotifyFrame){
    spotifyFrame.innerHTML = '<div style="color:#fff;font-size:.74rem;padding:10px;line-height:1.4;">Spotify no disponible.<br>Reproduciendo audio alternativo.</div>';
  }
  if(!loadLocalTrack(localIndex) && spotifyFrame){
    spotifyFrame.innerHTML = '<div style="color:#ffb3b3;font-size:.74rem;padding:10px;line-height:1.4;">No hay audio alternativo disponible.</div>';
  }
  updatePlayIcon(false);
}
function updatePlayIcon(isPlaying){
  spotifyIsPlaying = !!isPlaying;
  if(playBtn) playBtn.textContent = spotifyIsPlaying ? '⏸︎' : '▶︎';
}
function setFallbackEmbed(autoplay){
  if(!spotifyFrame) return;
  const base = getSpotifyEmbedUrl(CONFIG.spotifyPlaylistUrl);
  if(!base){
    enableLocalMode();
    return;
  }
  spotifyFallbackMode = true;
  spotifyFrame.innerHTML = `<iframe src="${base}${base.includes('?') ? '&' : '?'}autoplay=${autoplay ? '1' : '0'}" width="100%" height="100%" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
  updatePlayIcon(!!autoplay);
}
function initSpotifyController(){
  const uri = getSpotifyUri(CONFIG.spotifyPlaylistUrl);
  if(!uri || !spotifyFrame || !spotifyApi) return;
  spotifyApi.createController(spotifyFrame, { uri, width:'100%', height:'100%' }, (controller)=>{
    spotifyController = controller;
    spotifyFallbackMode = false;
    updatePlayIcon(false);
    controller.addListener('playback_update', (event)=>{
      const data = event && event.data ? event.data : null;
      if(data && typeof data.position === 'number') spotifyPlaybackPositionMs = data.position;
      const isPaused = event && event.data ? event.data.isPaused : true;
      updatePlayIcon(!isPaused);
    });
  });
}
if(FORCE_LOCAL_AUDIO){
  enableLocalMode();
} else {
  window.onSpotifyIframeApiReady = (IFrameAPI)=>{
    spotifyApi = IFrameAPI;
    initSpotifyController();
  };
  if(!window.SpotifyIframeApi){
    const script = document.createElement('script');
    script.src = 'https://open.spotify.com/embed/iframe-api/v1';
    script.async = true;
    document.body.appendChild(script);
  } else {
    spotifyApi = window.SpotifyIframeApi;
    initSpotifyController();
  }
  setTimeout(()=>{
    if(!spotifyController) enableLocalMode();
  }, 2500);
}
function togglePlayback(){
  if(localMode){
    if(!localAudio.src && !loadLocalTrack(localIndex)) return;
    if(localAudio.paused){
      localAudio.play().then(()=> updatePlayIcon(true)).catch(()=> updatePlayIcon(false));
    } else {
      localAudio.pause();
      updatePlayIcon(false);
    }
    return;
  }
  if(spotifyFallbackMode){
    setFallbackEmbed(!spotifyIsPlaying);
    return;
  }
  if(!spotifyController) return;
  if(typeof spotifyController.togglePlay === 'function'){
    spotifyController.togglePlay();
    return;
  }
  if(spotifyIsPlaying && typeof spotifyController.pause === 'function') spotifyController.pause();
  else if(typeof spotifyController.play === 'function') spotifyController.play();
  else if(typeof spotifyController.resume === 'function') spotifyController.resume();
}
function nextTrack(){
  if(localMode){
    if(loadLocalTrack(localIndex + 1)){
      localAudio.play().then(()=> updatePlayIcon(true)).catch(()=> updatePlayIcon(false));
    }
    return;
  }
  if(spotifyFallbackMode) return;
  if(!spotifyController) return;
  if(typeof spotifyController.next === 'function'){
    spotifyController.next();
    return;
  }
  if(typeof spotifyController.seek === 'function'){
    spotifyController.seek(spotifyPlaybackPositionMs + 30000);
  }
}
function previousTrack(){
  if(localMode){
    if(loadLocalTrack(localIndex - 1)){
      localAudio.play().then(()=> updatePlayIcon(true)).catch(()=> updatePlayIcon(false));
    }
    return;
  }
  if(spotifyFallbackMode) return;
  if(!spotifyController) return;
  if(typeof spotifyController.previous === 'function'){
    spotifyController.previous();
    return;
  }
  if(typeof spotifyController.restart === 'function'){
    spotifyController.restart();
    return;
  }
  if(typeof spotifyController.seek === 'function'){
    spotifyController.seek(Math.max(0, spotifyPlaybackPositionMs - 30000));
  }
}
function restartPlaylist(){
  if(localMode){
    if(loadLocalTrack(0)){
      localAudio.pause();
      localAudio.currentTime = 0;
      updatePlayIcon(false);
    }
    return;
  }
  if(spotifyFallbackMode){
    setFallbackEmbed(false);
    return;
  }
  const uri = getSpotifyUri(CONFIG.spotifyPlaylistUrl);
  if(!spotifyController || !uri || typeof spotifyController.loadUri !== 'function') return;
  spotifyController.loadUri(uri);
  spotifyController.pause();
  updatePlayIcon(false);
}
if(playBtn) playBtn.addEventListener('click', togglePlayback);
if(wheelPlayPause) wheelPlayPause.addEventListener('click', togglePlayback);
if(prevBtn) prevBtn.addEventListener('click', previousTrack);
if(nextBtn) nextBtn.addEventListener('click', nextTrack);
if(wheelMenu) wheelMenu.addEventListener('click', restartPlaylist);
localAudio.addEventListener('ended', ()=> nextTrack());
localAudio.addEventListener('pause', ()=> { if(localMode) updatePlayIcon(false); });
localAudio.addEventListener('play', ()=> { if(localMode) updatePlayIcon(true); });
</script>
